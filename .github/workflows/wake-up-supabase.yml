name: Wake Up Supabase

on:
  schedule:
    - cron: "0 6 * * *"   # 每天 UTC 06:00 (北京时间 14:00) 运行一次
  workflow_dispatch:       # 支持在 Actions 页面手动触发

jobs:
  ping-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Validate SUPABASE_PROJECTS_JSON secret exists
        env:
          SUPABASE_PROJECTS_JSON: ${{ secrets.SUPABASE_PROJECTS_JSON }}
        run: |
          if [ -z "$SUPABASE_PROJECTS_JSON" ]; then
            echo "❌ Secret SUPABASE_PROJECTS_JSON is not set."
            echo "Go to Settings → Secrets and variables → Actions and add it."
            exit 1
          fi

      - name: Ping Supabase projects to keep them awake
        env:
          SUPABASE_PROJECTS_JSON: ${{ secrets.SUPABASE_PROJECTS_JSON }}
        run: |
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y jq > /dev/null

          LENGTH=$(echo "$SUPABASE_PROJECTS_JSON" | jq '. | length')
          echo "📦 Found $LENGTH Supabase project(s)."

          if [ "$LENGTH" -eq 0 ]; then
            echo "⚠️ No projects defined in SUPABASE_PROJECTS_JSON."
            exit 0
          fi

          for i in $(seq 0 $((LENGTH - 1))); do
            URL=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].url")
            # 兼容字段名：优先 apikey，回退 anon_key（旧 schema）
            KEY=$(echo "$SUPABASE_PROJECTS_JSON" | jq -r ".[$i].apikey // .[$i].anon_key")

            if [ -z "$URL" ] || [ "$URL" = "null" ]; then
              echo "⚠️ Skipping project at index $i — missing url."
              continue
            fi

            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              echo "⚠️ Skipping $URL — missing apikey."
              continue
            fi

            HEALTH_URL="${URL%/}/auth/v1/health"
            echo "🌐 Pinging AUTH via: $HEALTH_URL"

            set +e
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: $KEY" \
              "$HEALTH_URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ Curl failed for $URL (exit code $CURL_EXIT). Skipping."
              continue
            fi

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ $URL responded with HTTP $HTTP_CODE — project is reachable."
            else
              echo "❌ $URL responded with HTTP $HTTP_CODE — check project status or URL."
            fi
          done
